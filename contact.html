<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="shortcut icon" href="/images/logo.png" type="image/x-icon" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="mediaquery.css" />
    <link rel="stylesheet" href="services.css" />
    <link rel="stylesheet" href="contact.css" />
    <title>Made by victor - contact</title>
  </head>
  <body>
    <!-- Scroll to the top -->
    <button onclick="topFunction()" id="myBtn" title="Go to top">
      <i class="fa-solid fa-arrow-up"></i>
    </button>
    <!--  -->

    <!-- HEADER -->
    <div id="header"></div>
    <!--  -->

    <!--  Hero -->
    <section class="services-section">
      <div class="service-wrapper container">
        <div class="services-content">
          <h3 class="badge">Connect With Us, We're Here to Help</h3>
          <h2 class="heading">Get in touch</h2>
        </div>
      </div>
    </section>

    <!--About us  -->

    <section class="contact">
      <div class="contact-wrapper container">
        <div class="contact-row">
          <div class="contact-left"></div>
          <div class="contact-right">
            <!-- Calendly inline widget begin -->
            <div
              class="calendly-inline-widget"
              data-url="https://calendly.com/victor-digitals001/30min?hide_event_type_details=1&hide_gdpr_banner=1&primary_color=ff0000"
              style="min-width: 320px; height: 700px"
            ></div>
            <script
              type="text/javascript"
              src="https://assets.calendly.com/assets/external/widget.js"
              async
            ></script>
            <!-- Calendly inline widget end -->
          </div>
        </div>
      </div>
    </section>

    <!-- socials -->
    <section class="socials">
      <div class="section-wrapper container">
        <div class="socials-row">
          <div class="socials-col">
            <img src="images/image copy 13.png" alt="" />
            <h3>Call Us</h3>
            <h4>
              Call us on WhatsApp we’ll get back to you soon.
              <a href="tel:+2349036817523">+234-9036-8175-23</a>
            </h4>
          </div>
          <div class="socials-col">
            <img src="images/image copy 14.png" alt="" />
            <h3>Socials</h3>
            <ul style="display: flex; gap: 30px">
              <li>
                <a
                  href="https://web.facebook.com/profile.php?id=100081521535783"
                  ><i class="fa-brands fa-facebook"></i
                ></a>
              </li>
              <li>
                <a href="https://www.linkedin.com/in/kayode-akintunde/"
                  ><i class="fa-brands fa-linkedin"></i
                ></a>
              </li>

              <li>
                <a href="https://www.instagram.com/victor_digitals/"
                  ><i class="fa-brands fa-instagram"></i
                ></a>
              </li>
            </ul>
          </div>
          <!-- <div class="socials-col">
            <img src="images/image copy 15.png" alt="" />
            <h3>Visit</h3>
            <h4>
              6587 Roller Derby Lane, Canada, and 730 Grant Street, San
              Francisco
            </h4>
          </div> -->
        </div>
      </div>
    </section>

    <!-- footer -->

    <div id="footer"></div>

    <!--  -->
    <script src="script.js"></script>
  </body>
</html>
